name: Monitor Published Research

on:
  schedule:
    - cron: '17 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: published-research-watchdog
  cancel-in-progress: true

jobs:
  monitor:
    name: Verify live release and freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the expected release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up deterministic Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Rebuild trusted asset fingerprints
        shell: bash
        env:
          SITE_OUTPUT_DIR: ${{ runner.temp }}/expected-site
          SITE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          test ! -e "$SITE_OUTPUT_DIR"
          python3 build_site.py
          html_sha256=$(sha256sum "$SITE_OUTPUT_DIR/index.html" | awk '{print $1}')
          brief_sha256=$(sha256sum "$SITE_OUTPUT_DIR/article_briefs.json" | awk '{print $1}')
          observation_sha256=$(sha256sum "$SITE_OUTPUT_DIR/observations.json" | awk '{print $1}')
          support_sha256=$(SITE_OUTPUT_DIR="$SITE_OUTPUT_DIR" python3 -c "import os; from smoke_test_site import support_bundle_checksum; print(support_bundle_checksum(os.environ['SITE_OUTPUT_DIR']))")
          data_sha256=$(SITE_OUTPUT_DIR="$SITE_OUTPUT_DIR" python3 -c "import os; from data_contract import data_bundle_checksum; print(data_bundle_checksum(os.environ['SITE_OUTPUT_DIR']))")
          share_sha256=$(SITE_OUTPUT_DIR="$SITE_OUTPUT_DIR" python3 -c "import os; from smoke_test_site import share_proof_bundle_checksum; print(share_proof_bundle_checksum(os.environ['SITE_OUTPUT_DIR'], 'articles_index.json'))")
          [[ "$html_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$brief_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$observation_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$support_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$data_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$share_sha256" =~ ^[0-9a-f]{64}$ ]]
          echo "EXPECTED_HTML_SHA256=$html_sha256" >> "$GITHUB_ENV"
          echo "EXPECTED_BRIEF_SHA256=$brief_sha256" >> "$GITHUB_ENV"
          echo "EXPECTED_OBSERVATION_SHA256=$observation_sha256" >> "$GITHUB_ENV"
          echo "EXPECTED_SUPPORT_SHA256=$support_sha256" >> "$GITHUB_ENV"
          echo "EXPECTED_DATA_SHA256=$data_sha256" >> "$GITHUB_ENV"
          echo "EXPECTED_SHARE_SHA256=$share_sha256" >> "$GITHUB_ENV"

      - name: Verify exact live release
        run: >-
          python3 smoke_test_site.py
          --expected-revision "$GITHUB_SHA"
          --articles-file articles_index.json
          --observations-file trades_extracted.json
          --expected-html-sha256 "$EXPECTED_HTML_SHA256"
          --expected-brief-sha256 "$EXPECTED_BRIEF_SHA256"
          --expected-observation-sha256 "$EXPECTED_OBSERVATION_SHA256"
          --expected-support-sha256 "$EXPECTED_SUPPORT_SHA256"
          --expected-data-sha256 "$EXPECTED_DATA_SHA256"
          --expected-share-sha256 "$EXPECTED_SHARE_SHA256"
          --retries 2
          --retry-delay 5
          https://navnoorthapar.github.io/substack-trades/

      - name: Enforce scheduled-refresh freshness
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timedelta, timezone

          snapshot = json.load(open('snapshot_manifest.json', encoding='utf-8'))
          checked_at = datetime.fromisoformat(str(snapshot['checked_at']).replace('Z', '+00:00'))
          now = datetime.now(timezone.utc)
          future_cutoff = now + timedelta(minutes=10)
          if checked_at.astimezone(timezone.utc) > future_cutoff:
              raise SystemExit('Published research snapshot check time is implausibly far in the future')
          for source, status in snapshot.get('sources', {}).items():
              source_checked = datetime.fromisoformat(str(status['checked_at']).replace('Z', '+00:00'))
              if source_checked.astimezone(timezone.utc) > future_cutoff:
                  raise SystemExit(f'{source} check time is implausibly far in the future')
          age = now - checked_at.astimezone(timezone.utc)
          if age.total_seconds() > 16 * 3600:
              raise SystemExit(
                  f"Published research snapshot is stale: {age.total_seconds() / 3600:.1f} hours old"
              )
          print(f"Published research snapshot is current: {age.total_seconds() / 3600:.1f} hours old")
          PY
