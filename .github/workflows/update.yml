name: Update Trade Intelligence

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 8am UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch posts from Substack
        id: fetch
        run: |
          python fetch_all_posts.py
          COUNT=$(python -c "import json; print(len(json.load(open('all_posts.json'))))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Fetched $COUNT posts"

      - name: Extract trades
        if: steps.fetch.outputs.count != '0'
        run: python extract_trades.py

      - name: Filter & deduplicate trades
        if: steps.fetch.outputs.count != '0'
        run: python filter_trades.py

      - name: Build site
        if: steps.fetch.outputs.count != '0'
        run: python build_site.py

      - name: Commit and push if anything changed
        if: steps.fetch.outputs.count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades_extracted.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes — site is already up to date."
          else
            git commit -m "auto-update $(date -u '+%Y-%m-%d')"
            git push
          fi
