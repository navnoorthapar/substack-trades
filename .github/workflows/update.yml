name: Validate and Deploy Pages

# Publication fetching stays on the scheduled Mac because Substack blocks
# cloud datacenter traffic. GitHub receives only a validated source snapshot,
# then independently tests, builds, and atomically deploys it.
#
# This bootstrap revision is deliberately manual-only while Pages still serves
# the legacy /docs directory. Automatic main/PR triggers are enabled after the
# first artifact deployment is verified.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run regression suite
        run: python -m unittest discover -s . -p 'test_*.py' -v

      - name: Validate deployable data snapshot
        run: >-
          python validate_pipeline.py
          --articles articles_index.json
          --trades trades_extracted.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build immutable site artifact
        env:
          SITE_OUTPUT_DIR: ${{ github.workspace }}/_site
        run: |
          rm -rf _site
          python build_site.py
          test -s _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          retention-days: 1

  deploy:
    name: Deploy production
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
