name: Rebuild Site

# Build-only safety net. The data refresh (fetch from Substack) CANNOT run here:
# Substack returns HTTP 403 to GitHub's datacenter IPs (Cloudflare bot
# protection), so fetching must happen from a residential IP — that is done on
# the Mac by refresh.sh + the LaunchAgent (com.navnoor.substacktrades).
#
# This workflow only rebuilds docs/index.html from the already-committed
# trades_extracted.json. Use it (Actions tab → "Run workflow") to regenerate the
# site after changing build_site.py, without re-fetching. Day-to-day the Mac
# already builds and pushes docs/index.html alongside the data, so this is rarely
# needed.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rebuild-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python build_site.py

      - name: Commit rebuilt site if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "rebuild site $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
