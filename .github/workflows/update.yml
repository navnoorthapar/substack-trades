name: Rebuild Site

# Build-only safety net. The data refresh (fetch from Substack) CANNOT run here:
# Substack returns HTTP 403 to GitHub's datacenter IPs (Cloudflare bot
# protection), so fetching must happen from a residential IP — that is done on
# the Mac by refresh.sh + the LaunchAgent (com.navnoor.substacktrades).
#
# This workflow only rebuilds docs/index.html from already-committed data. It
# runs when the builder or tracked data changes, and can also be started from the
# Actions tab. The generated docs/index.html path is intentionally excluded from
# the push filter so the bot's rebuild commit cannot trigger a workflow loop.

on:
  push:
    branches:
      - main
    paths:
      - build_site.py
      - trades_extracted.json
      - articles_index.json
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rebuild-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python build_site.py

      - name: Commit rebuilt site if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "rebuild site $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
