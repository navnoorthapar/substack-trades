name: Validate and Deploy Pages

# Publication fetching stays on the scheduled Mac because Substack blocks
# cloud datacenter traffic. GitHub receives only a validated source snapshot,
# then independently tests, builds, and atomically deploys it.
#
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: >-
    pages-${{
      github.event_name == 'pull_request'
      && github.event.pull_request.number
      || 'production'
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      html_sha256: ${{ steps.asset_hashes.outputs.html_sha256 }}
      brief_sha256: ${{ steps.asset_hashes.outputs.brief_sha256 }}
      observation_sha256: ${{ steps.asset_hashes.outputs.observation_sha256 }}
      support_sha256: ${{ steps.asset_hashes.outputs.support_sha256 }}
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Run regression suite
        run: python -m unittest discover -s . -p 'test_*.py' -v

      - name: Validate deployable data snapshot
        shell: bash
        run: |
          set -euo pipefail
          previous_dir="$RUNNER_TEMP/previous-snapshot"
          mkdir -p "$previous_dir"
          validation_args=(
            --articles articles_index.json
            --trades trades_extracted.json
            --manifest snapshot_manifest.json
          )

          if git cat-file -e HEAD^:articles_index.json 2>/dev/null \
            && git cat-file -e HEAD^:trades_extracted.json 2>/dev/null \
            && git cat-file -e HEAD^:snapshot_manifest.json 2>/dev/null; then
            git show HEAD^:articles_index.json > "$previous_dir/articles_index.json"
            git show HEAD^:trades_extracted.json > "$previous_dir/trades_extracted.json"
            git show HEAD^:snapshot_manifest.json > "$previous_dir/snapshot_manifest.json"
            validation_args+=(
              --previous-articles "$previous_dir/articles_index.json"
              --previous-trades "$previous_dir/trades_extracted.json"
              --previous-manifest "$previous_dir/snapshot_manifest.json"
            )
          else
            echo "No complete prior manifest-backed snapshot; validating current snapshot only."
          fi

          python validate_pipeline.py "${validation_args[@]}"

      - name: Configure GitHub Pages
        if: >-
          github.ref == 'refs/heads/main'
          && github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build immutable site artifact
        env:
          SITE_OUTPUT_DIR: ${{ github.workspace }}/_site
          SITE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          test ! -e _site
          python build_site.py

      - name: Compile generated inline JavaScript
        run: python validate_inline_scripts.py _site/index.html

      - name: Enforce artifact integrity and size policy
        env:
          SITE_REVISION: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html
          test -f _site/article_briefs.json
          test -f _site/observations.json
          test -f _site/robots.txt
          test -f _site/sitemap.xml
          test -f _site/site.webmanifest
          test -f _site/favicon.svg
          test -f _site/og.jpg
          test ! -L _site/index.html
          test ! -L _site/article_briefs.json
          test ! -L _site/observations.json
          artifact_file_count=$(find _site -type f | wc -l | tr -d ' ')
          if (( artifact_file_count != 8 )); then
            echo "Generated artifact must contain exactly the three application assets and five launch support assets." >&2
            exit 1
          fi
          if find _site -type l -print -quit | grep -q .; then
            echo "Generated artifact contains a symbolic link." >&2
            exit 1
          fi

          index_bytes=$(wc -c < _site/index.html | tr -d ' ')
          brief_bytes=$(wc -c < _site/article_briefs.json | tr -d ' ')
          observation_bytes=$(wc -c < _site/observations.json | tr -d ' ')
          gzip_bytes=$(gzip -9 -c _site/index.html | wc -c | tr -d ' ')
          total_bytes=$(du -sk _site | awk '{print $1 * 1024}')
          if (( index_bytes < 100000 || index_bytes > 900000 )); then
            echo "index.html size ${index_bytes} is outside the 100–900 KB first-load policy." >&2
            exit 1
          fi
          if (( gzip_bytes > 250000 )); then
            echo "Compressed index size ${gzip_bytes} exceeds the 250 KB first-load policy." >&2
            exit 1
          fi
          if (( brief_bytes < 100000 || brief_bytes > 800000 )); then
            echo "Deferred dossier size ${brief_bytes} is outside the 100–800 KB policy." >&2
            exit 1
          fi
          if (( observation_bytes < 500000 || observation_bytes > 1500000 )); then
            echo "Deferred observation size ${observation_bytes} is outside the 500 KB–1.5 MB policy." >&2
            exit 1
          fi
          if (( total_bytes > 3000000 )); then
            echo "Site artifact size ${total_bytes} exceeds the 3.0 MB policy." >&2
            exit 1
          fi
          echo "Size policy passed: raw=${index_bytes}, gzip=${gzip_bytes}, dossiers=${brief_bytes}, observations=${observation_bytes}, total=${total_bytes} bytes."

          python - <<'PY'
          import json
          import os
          import re
          import unicodedata
          from pathlib import Path
          from smoke_test_site import snapshot_checksum, validate_html

          articles = json.loads(Path('articles_index.json').read_text(encoding='utf-8'))
          source_observations = json.loads(Path('trades_extracted.json').read_text(encoding='utf-8'))
          html = Path('_site/index.html').read_text(encoding='utf-8')
          deferred = json.loads(Path('_site/article_briefs.json').read_text(encoding='utf-8'))
          observation_asset = json.loads(Path('_site/observations.json').read_text(encoding='utf-8'))
          expected_checksum = snapshot_checksum('articles_index.json', 'trades_extracted.json')
          if deferred.get('schema_version') != 1:
              raise SystemExit('Deferred article dossier schema mismatch.')
          if deferred.get('data_checksum') != expected_checksum:
              raise SystemExit('Deferred article dossiers do not match the source snapshot.')
          if not isinstance(deferred.get('briefs'), dict) or not deferred['briefs']:
              raise SystemExit('Deferred article dossier payload is empty.')
          if observation_asset.get('schema_version') != 1:
              raise SystemExit('Deferred observation schema mismatch.')
          if observation_asset.get('data_checksum') != expected_checksum:
              raise SystemExit('Deferred observations do not match the source snapshot.')
          if not isinstance(observation_asset.get('observations'), list):
              raise SystemExit('Deferred observation payload is invalid.')
          asset_observations = observation_asset['observations']
          if len(asset_observations) != len(source_observations):
              raise SystemExit('Deferred observation count does not match the source snapshot.')

          article_match = re.search(r'const ARTICLES = (.*?);\n', html)
          if not article_match:
              raise SystemExit('Generated article identity map is missing.')
          generated_articles = json.loads(article_match.group(1))
          article_url_by_id = {
              row['id']: str(row['url']).rstrip('/') for row in generated_articles
          }
          expected_owner_by_id = {}
          for article in generated_articles:
              idea_ids = article.get('idea_ids')
              if not isinstance(idea_ids, list):
                  raise SystemExit('Generated article observation references are invalid.')
              for idea_id in idea_ids:
                  if not idea_id or idea_id in expected_owner_by_id:
                      raise SystemExit('Generated article observation references are duplicated.')
                  expected_owner_by_id[idea_id] = article['id']
          asset_ids = [str(row.get('id') or '') for row in asset_observations]
          if not all(asset_ids) or len(asset_ids) != len(set(asset_ids)):
              raise SystemExit('Deferred observation identities are invalid or duplicated.')
          if set(asset_ids) != set(expected_owner_by_id):
              raise SystemExit('Deferred observations do not match generated article references.')
          if any(
              expected_owner_by_id[row['id']] != row.get('article_id')
              for row in asset_observations
          ):
              raise SystemExit('Deferred observation article ownership is invalid.')

          def source_identity(row):
              return (
                  str(row.get('article_url') or '').rstrip('/'),
                  str(row.get('trade_description') or '').strip(),
              )

          def asset_identity(row):
              return (
                  article_url_by_id.get(row.get('article_id'), ''),
                  str(row.get('description') or ''),
              )

          source_by_identity = {source_identity(row): row for row in source_observations}
          asset_by_identity = {asset_identity(row): row for row in asset_observations}
          if (
              len(source_by_identity) != len(source_observations)
              or len(asset_by_identity) != len(asset_observations)
              or set(asset_by_identity) != set(source_by_identity)
          ):
              raise SystemExit('Deferred observation identities do not match the source snapshot.')

          def source_content(row):
              instruments = [
                  str(value) for value in (row.get('instruments') or ['unspecified'])
                  if value
              ] or ['unspecified']
              manager = ' '.join(unicodedata.normalize(
                  'NFKC', str(row.get('fund_name_if_mentioned') or '')
              ).split())
              return {
                  'description': str(row.get('trade_description') or '').strip(),
                  'description_truncated': bool(row.get('description_truncated', False)),
                  'direction': str(row.get('direction') or 'unspecified'),
                  'instruments': instruments,
                  'underlying': row.get('underlying') or '',
                  'thesis': row.get('edge_or_thesis') or '',
                  'quant': row.get('any_quant_detail') or '',
                  'outcome': row.get('outcome_if_mentioned') or '',
                  'manager_raw': manager,
              }

          for identity, source_row in source_by_identity.items():
              asset_row = asset_by_identity[identity]
              expected = source_content(source_row)
              actual = {field: asset_row.get(field) for field in expected}
              if actual != expected:
                  raise SystemExit('Deferred observation content differs from the source snapshot.')
          validate_html(
              html,
              os.environ['SITE_REVISION'],
              len(articles),
              len(source_observations),
              expected_checksum,
          )
          print(f'Artifact policy passed: {len(html.encode("utf-8"))} bytes.')
          PY

      - name: Record trusted release fingerprints
        id: asset_hashes
        shell: bash
        run: |
          set -euo pipefail
          html_sha256=$(sha256sum _site/index.html | awk '{print $1}')
          brief_sha256=$(sha256sum _site/article_briefs.json | awk '{print $1}')
          observation_sha256=$(sha256sum _site/observations.json | awk '{print $1}')
          support_sha256=$(python -c "from smoke_test_site import support_bundle_checksum; print(support_bundle_checksum('_site'))")
          [[ "$html_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$brief_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$observation_sha256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$support_sha256" =~ ^[0-9a-f]{64}$ ]]
          echo "html_sha256=$html_sha256" >> "$GITHUB_OUTPUT"
          echo "brief_sha256=$brief_sha256" >> "$GITHUB_OUTPUT"
          echo "observation_sha256=$observation_sha256" >> "$GITHUB_OUTPUT"
          echo "support_sha256=$support_sha256" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        if: >-
          github.ref == 'refs/heads/main'
          && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          retention-days: 7

  deploy:
    name: Deploy production
    if: >-
      github.ref == 'refs/heads/main'
      && github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out smoke test and expected snapshot
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Verify exact release is live
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_REVISION: ${{ github.sha }}
          EXPECTED_HTML_SHA256: ${{ needs.quality.outputs.html_sha256 }}
          EXPECTED_BRIEF_SHA256: ${{ needs.quality.outputs.brief_sha256 }}
          EXPECTED_OBSERVATION_SHA256: ${{ needs.quality.outputs.observation_sha256 }}
          EXPECTED_SUPPORT_SHA256: ${{ needs.quality.outputs.support_sha256 }}
        run: >-
          python smoke_test_site.py "$DEPLOYED_URL"
          --expected-revision "$EXPECTED_REVISION"
          --articles-file articles_index.json
          --observations-file trades_extracted.json
          --expected-html-sha256 "$EXPECTED_HTML_SHA256"
          --expected-brief-sha256 "$EXPECTED_BRIEF_SHA256"
          --expected-observation-sha256 "$EXPECTED_OBSERVATION_SHA256"
          --expected-support-sha256 "$EXPECTED_SUPPORT_SHA256"
          --retries 8
          --retry-delay 10
          --timeout 20
