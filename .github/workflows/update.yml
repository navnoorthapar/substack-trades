name: Update Trade Intelligence

on:
  push:
    branches: [main]
    paths:
      - 'trades_extracted.json'   # only rebuild when data actually changes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python build_site.py

      - name: Commit rebuilt site if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "rebuild site $(date -u '+%Y-%m-%d')"
            git push
          fi
